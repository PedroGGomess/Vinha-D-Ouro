<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Gestão de Caves — Vinha D'Ouro">
  <title>Gestão de Caves — Vinha D'Ouro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Inter:wght@300;400;500;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    /* ════════════════════════════════════════════════════════════════════════════
       CAVES PAGE LAYOUT
       ════════════════════════════════════════════════════════════════════════════ */

    .caves-layout {
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: var(--sp-6);
      margin-bottom: var(--sp-8);
    }

    .cave-sidebar {
      display: flex;
      flex-direction: column;
      gap: var(--sp-4);
    }

    .cave-selector {
      display: flex;
      gap: var(--sp-2);
      margin-bottom: var(--sp-4);
    }

    .cave-selector-btn {
      flex: 1;
      padding: var(--sp-2) var(--sp-3);
      background: var(--bg-surface);
      border: 2px solid var(--border);
      border-radius: var(--r-md);
      color: var(--text-secondary);
      font-weight: 600;
      font-size: 0.8125rem;
      cursor: pointer;
      transition: all var(--t-base) var(--ease);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .cave-selector-btn:hover {
      border-color: var(--border-hover);
      background: var(--bg-hover);
      color: var(--text-primary);
    }

    .cave-selector-btn.active {
      background: linear-gradient(135deg, var(--gold), var(--gold-light));
      border-color: var(--gold);
      color: var(--bg-base);
      box-shadow: var(--shadow-gold);
    }

    .cave-info-card {
      background: linear-gradient(135deg, var(--bg-elevated), var(--bg-surface));
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      padding: var(--sp-4);
      backdrop-filter: blur(10px);
    }

    .cave-stat-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--sp-4);
      margin-bottom: var(--sp-4);
    }

    .cave-stat-row:last-child {
      margin-bottom: 0;
    }

    .cave-stat-item {
      display: flex;
      flex-direction: column;
      gap: var(--sp-1);
    }

    .cave-stat-item .stat-lbl {
      font-size: 0.75rem;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-weight: 600;
    }

    .cave-stat-item .stat-val {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--gold);
      font-family: var(--font-display);
    }

    .cave-stat-item .stat-pct {
      font-size: 0.8125rem;
      color: var(--text-secondary);
      margin-top: var(--sp-1);
    }

    .cave-stat-progress {
      width: 100%;
      height: 6px;
      background: var(--bg-surface);
      border-radius: var(--r-full);
      overflow: hidden;
      margin-top: var(--sp-2);
    }

    .cave-stat-progress-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--gold), var(--gold-light));
      border-radius: var(--r-full);
      transition: width var(--t-slow) var(--ease);
    }

    .slot-info-section {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      padding: var(--sp-4);
      margin-bottom: var(--sp-4);
    }

    .slot-info-section h3 {
      font-size: 0.8125rem;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-weight: 600;
      margin-bottom: var(--sp-3);
    }

    .slot-info-content {
      display: flex;
      flex-direction: column;
      gap: var(--sp-3);
      min-height: 120px;
    }

    .slot-info-empty {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100px;
      color: var(--text-muted);
      font-style: italic;
    }

    .slot-wine-info {
      background: var(--bg-elevated);
      padding: var(--sp-3);
      border-radius: var(--r-md);
      border: 1px solid var(--border);
    }

    .slot-wine-name {
      font-weight: 600;
      color: var(--text-primary);
      font-size: 0.875rem;
      margin-bottom: var(--sp-1);
    }

    .slot-wine-details {
      font-size: 0.75rem;
      color: var(--text-secondary);
      display: flex;
      gap: var(--sp-2);
      flex-wrap: wrap;
    }

    .slot-wine-details span {
      display: flex;
      gap: var(--sp-1);
    }

    .slot-actions {
      display: flex;
      flex-direction: column;
      gap: var(--sp-2);
    }

    .slot-select-group {
      display: flex;
      gap: var(--sp-2);
    }

    #slot-wine-select {
      flex: 1;
    }

    .cave-grid-container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
      gap: var(--sp-2);
      background: var(--bg-surface);
      padding: var(--sp-4);
      border-radius: var(--r-lg);
      border: 1px solid var(--border);
      min-height: 600px;
    }

    .cave-slot {
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-elevated);
      border: 2px solid var(--border-subtle);
      border-radius: var(--r-md);
      cursor: pointer;
      transition: all var(--t-base) var(--ease);
      position: relative;
      overflow: hidden;
      font-weight: 600;
      font-size: 0.75rem;
      text-align: center;
      padding: var(--sp-2);
    }

    .cave-slot::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(201, 168, 76, 0.1), rgba(155, 35, 53, 0.1));
      pointer-events: none;
      opacity: 0;
      transition: opacity var(--t-base) var(--ease);
    }

    .cave-slot:hover {
      border-color: var(--border-hover);
      background: var(--bg-hover);
      transform: translateY(-2px);
      box-shadow: var(--shadow-xs);
    }

    .cave-slot:hover::before {
      opacity: 1;
    }

    .cave-slot.empty {
      background: var(--bg-surface);
      border-color: var(--border-subtle);
      color: var(--text-muted);
    }

    .cave-slot.empty:hover {
      border-color: var(--gold);
      background: rgba(201, 168, 76, 0.05);
    }

    .cave-slot.occupied {
      background: linear-gradient(135deg, var(--bg-elevated), var(--bg-surface));
      border-color: var(--gold);
      color: var(--gold);
    }

    .cave-slot.occupied:hover {
      box-shadow: var(--shadow-gold);
    }

    .cave-slot.selected {
      border-color: var(--gold);
      background: rgba(201, 168, 76, 0.15);
      box-shadow: 0 0 0 3px rgba(201, 168, 76, 0.25);
    }

    .cave-slot-label {
      z-index: 2;
      position: relative;
      line-height: 1.2;
    }

    /* ════════════════════════════════════════════════════════════════════════════
       RESPONSIVE
       ════════════════════════════════════════════════════════════════════════════ */

    @media (max-width: 1024px) {
      .caves-layout {
        grid-template-columns: 1fr;
        gap: var(--sp-4);
      }

      .cave-sidebar {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: var(--sp-4);
      }

      .cave-info-card {
        grid-column: 1 / -1;
      }

      .cave-grid-container {
        grid-column: 1 / -1;
      }
    }

    @media (max-width: 640px) {
      .caves-layout {
        grid-template-columns: 1fr;
      }

      .cave-selector {
        flex-wrap: wrap;
      }

      .cave-selector-btn {
        flex: 1 1 calc(33.333% - var(--sp-2));
      }

      .cave-stat-row {
        grid-template-columns: 1fr;
      }

      .cave-grid-container {
        grid-template-columns: repeat(auto-fit, minmax(60px, 1fr));
      }

      .cave-sidebar {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <a href="#main-content" class="skip-to-content">Saltar para conteúdo principal</a>

  <div class="app-layout">
    <!-- ╔════════════════════════════════════════════════════════════════════════╗ -->
    <!-- ║ SIDEBAR                                                                ║ -->
    <!-- ╚════════════════════════════════════════════════════════════════════════╝ -->
    <nav class="sidebar">
      <div class="sidebar-brand">
        <h2>Vinha D'Ouro</h2>
        <p class="brand-subtitle">ARMAZÉM</p>
      </div>

      <div class="sidebar-nav">
        <p class="nav-section-label">Inventário</p>
        <a href="stock.html" class="nav-link">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path>
          </svg>
          Stock
        </a>
        <a href="caves.html" class="nav-link active">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 21H7a2 2 0 0 1-2-2V9.414a1 1 0 0 1 .293-.707l5.414-5.414a1 1 0 0 1 1.414 0l5.414 5.414a1 1 0 0 1 .293.707V19a2 2 0 0 1-2 2h-2"></path>
            <rect x="9" y="9" width="6" height="12"></rect>
          </svg>
          Caves
        </a>
      </div>

      <div class="sidebar-footer">
        <div class="user-block">
          <div class="user-avatar" id="user-avatar">U</div>
          <div class="user-info">
            <p class="user-name" id="user-name">Utilizador</p>
            <p class="user-role">Armazenista</p>
          </div>
        </div>
        <button class="btn btn-ghost btn-sm" onclick="logout()" title="Terminar sessão">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
            <polyline points="16 17 21 12 16 7"></polyline>
            <line x1="21" y1="12" x2="9" y2="12"></line>
          </svg>
          Sair
        </button>
      </div>

      <div class="api-badge" title="Estado de ligação da API">
        <span class="api-status"></span>
        <span id="api-label">API Conectado</span>
      </div>
    </nav>

    <!-- ╔════════════════════════════════════════════════════════════════════════╗ -->
    <!-- ║ MAIN CONTENT                                                           ║ -->
    <!-- ╚════════════════════════════════════════════════════════════════════════╝ -->
    <main class="main-content" id="main-content">
      <div id="toasts" class="toasts-container"></div>

      <!-- Page Header -->
      <div class="page-header">
        <div>
          <h1 class="page-title">Gestão de Caves</h1>
          <p id="cave-name" class="page-subtitle">Cave A</p>
        </div>
      </div>

      <!-- Two-Column Layout -->
      <div class="caves-layout">
        <!-- LEFT: Cave Sidebar -->
        <div class="cave-sidebar">
          <!-- Cave Selector -->
          <div class="cave-selector">
            <button class="cave-selector-btn active" onclick="loadCave('A')">Cave A</button>
            <button class="cave-selector-btn" onclick="loadCave('B')">Cave B</button>
            <button class="cave-selector-btn" onclick="loadCave('C')">Cave C</button>
          </div>

          <!-- Cave Info Card -->
          <div class="cave-info-card">
            <div class="cave-stat-row">
              <div class="cave-stat-item">
                <span class="stat-lbl">Capacidade</span>
                <span class="stat-val" id="cave-capacity">100</span>
              </div>
              <div class="cave-stat-item">
                <span class="stat-lbl">Ocupação</span>
                <span class="stat-val" id="cave-occupied">0</span>
              </div>
            </div>

            <div class="cave-stat-row">
              <div class="cave-stat-item">
                <span class="stat-lbl">Disponível</span>
                <span class="stat-val" style="color: var(--success);" id="cave-free">100</span>
              </div>
              <div class="cave-stat-item">
                <span class="stat-lbl">Taxa Ocupação</span>
                <span class="stat-val" id="cave-pct">0%</span>
              </div>
            </div>

            <div class="cave-stat-progress">
              <div class="cave-stat-progress-bar" id="cave-progress-bar" style="width: 0%"></div>
            </div>
          </div>

          <!-- Slot Info Section -->
          <div class="slot-info-section">
            <h3>Informação da Posição</h3>
            <div id="slot-info-content" class="slot-info-content">
              <div class="slot-info-empty">Selecione uma posição</div>
            </div>
          </div>

          <!-- Slot Actions -->
          <div class="slot-info-section">
            <h3>Ações</h3>
            <div class="slot-actions" id="slot-actions">
              <div class="slot-select-group">
                <select id="slot-wine-select" class="form-select">
                  <option value="">Selecione um vinho...</option>
                </select>
              </div>
              <button class="btn btn-primary btn-sm" onclick="assignWineToSlot()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <polyline points="12 5 19 12 12 19"></polyline>
                  <polyline points="19 12 5 12"></polyline>
                </svg>
                Atribuir Vinho
              </button>
              <button class="btn btn-danger btn-sm hidden" id="clear-slot-btn" onclick="clearSlot()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <polyline points="3 6 5 6 21 6"></polyline>
                  <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                </svg>
                Remover Vinho
              </button>
            </div>
          </div>
        </div>

        <!-- RIGHT: Cave Grid -->
        <div class="cave-grid-container" id="cave-grid-container">
          <!-- Filled by JavaScript -->
        </div>
      </div>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
