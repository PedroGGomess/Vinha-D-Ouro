<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Vinha D'Ouro — Sistema de Gestão Premium para Lojas de Vinho">
  <title>Vinha D'Ouro — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    /* ===== LOGIN PAGE FULL-SCREEN LAYOUT ===== */
    body.login-page-body {
      margin: 0;
      padding: 0;
      overflow: hidden;
    }

    .login-page {
      position: fixed;
      inset: 0;
      background: #0c0a14;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: auto;
    }

    /* ===== ANIMATED BACKGROUND ORBS ===== */
    .login-bg-orb {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
      filter: blur(60px);
    }

    .login-bg-orb-1 {
      width: 500px;
      height: 500px;
      top: -10%;
      left: -5%;
      background: radial-gradient(ellipse at center, rgba(180, 140, 255, 0.15) 0%, transparent 70%);
      animation: floatOrb1 15s ease-in-out infinite;
    }

    .login-bg-orb-2 {
      width: 400px;
      height: 400px;
      bottom: -8%;
      right: -3%;
      background: radial-gradient(ellipse at center, rgba(201, 162, 39, 0.1) 0%, transparent 70%);
      animation: floatOrb2 18s ease-in-out infinite;
    }

    .login-bg-orb-3 {
      width: 350px;
      height: 350px;
      top: 50%;
      right: 5%;
      background: radial-gradient(ellipse at center, rgba(194, 24, 91, 0.08) 0%, transparent 70%);
      animation: floatOrb3 20s ease-in-out infinite;
    }

    @keyframes floatOrb1 {
      0%, 100% { transform: translate(0, 0); }
      33% { transform: translate(30px, -40px); }
      66% { transform: translate(-20px, 30px); }
    }

    @keyframes floatOrb2 {
      0%, 100% { transform: translate(0, 0); }
      33% { transform: translate(-25px, 35px); }
      66% { transform: translate(35px, -25px); }
    }

    @keyframes floatOrb3 {
      0%, 100% { transform: translate(0, 0); }
      33% { transform: translate(-15px, 20px); }
      66% { transform: translate(20px, -15px); }
    }

    /* ===== TOP GOLD ACCENT LINE ===== */
    .login-top-accent {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, transparent, #c9a227, transparent);
      z-index: 10;
      box-shadow: 0 0 30px rgba(201, 162, 39, 0.4);
    }

    /* ===== LOGIN CONTAINER ===== */
    .login-container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 500px;
      padding: 40px;
    }

    /* ===== HEADER / BRANDING ===== */
    .login-header {
      text-align: center;
      margin-bottom: 50px;
      animation: slideInDown 0.9s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .login-icon-wrapper {
      width: 90px;
      height: 90px;
      margin: 0 auto 30px;
      background: linear-gradient(135deg, #c2185b, #8b3a44);
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 12px 40px rgba(194, 24, 91, 0.3);
      border: 2px solid #c9a227;
    }

    .login-icon-wrapper svg {
      width: 50px;
      height: 50px;
      color: #c9a227;
      stroke-width: 1;
    }

    .login-title {
      font-family: "Playfair Display", serif;
      font-size: 48px;
      font-weight: 700;
      color: #ffffff;
      margin: 0 0 10px 0;
      letter-spacing: -1px;
    }

    .login-subtitle {
      font-family: "Inter", sans-serif;
      font-size: 16px;
      color: #b48cff;
      font-weight: 500;
      letter-spacing: 0.5px;
      margin: 0 0 20px 0;
    }

    .login-divider-line {
      width: 60px;
      height: 2px;
      background: linear-gradient(90deg, transparent, #c9a227, transparent);
      margin: 0 auto 15px;
    }

    .login-tagline {
      font-size: 13px;
      color: #999;
      letter-spacing: 0.3px;
      margin: 0;
    }

    /* ===== CARD WRAPPER ===== */
    .login-card {
      background: rgba(25, 20, 45, 0.6);
      border: 1px solid rgba(201, 162, 39, 0.2);
      border-radius: 16px;
      padding: 40px;
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      animation: slideInUp 0.9s cubic-bezier(0.34, 1.56, 0.64, 1) 0.1s both;
      margin-bottom: 40px;
    }

    /* ===== FORM STYLING ===== */
    .login-form {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .form-group {
      position: relative;
    }

    .form-input {
      width: 100%;
      padding: 16px 18px;
      background: rgba(255, 255, 255, 0.05);
      border: 1.5px solid rgba(201, 162, 39, 0.15);
      border-radius: 10px;
      font-family: "Inter", sans-serif;
      font-size: 15px;
      color: #ffffff;
      transition: all 0.3s ease;
      outline: none;
    }

    .form-input::placeholder {
      color: #777;
    }

    .form-input:focus {
      border-color: #c9a227;
      background: rgba(201, 162, 39, 0.08);
      box-shadow: 0 0 0 3px rgba(201, 162, 39, 0.12);
    }

    .form-label {
      position: absolute;
      top: -12px;
      left: 16px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: #b48cff;
      background: rgba(25, 20, 45, 0.8);
      padding: 0 8px;
      transition: color 0.3s ease;
    }

    .form-input:focus ~ .form-label,
    .form-input:not(:placeholder-shown) ~ .form-label {
      color: #c9a227;
    }

    /* ===== ERROR MESSAGE ===== */
    .login-error {
      padding: 14px 16px;
      background: rgba(255, 107, 107, 0.1);
      border: 1px solid rgba(255, 107, 107, 0.3);
      border-radius: 8px;
      color: #ff6b6b;
      font-size: 13px;
      display: none;
      animation: slideInDown 0.3s ease;
    }

    .login-error.show {
      display: block;
    }

    /* ===== SUBMIT BUTTON ===== */
    .btn-submit {
      padding: 16px 24px;
      background: linear-gradient(135deg, #c2185b, #8b3a44);
      color: #ffffff;
      border: none;
      border-radius: 10px;
      font-family: "Inter", sans-serif;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.3s ease;
      outline: 2px solid transparent;
      outline-offset: 2px;
      min-height: 48px;
    }

    .btn-submit:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 32px rgba(194, 24, 91, 0.4);
    }

    .btn-submit:focus {
      outline-color: #c9a227;
    }

    .btn-submit:active {
      transform: translateY(-1px);
    }

    /* ===== DEMO CREDENTIALS SECTION ===== */
    .demo-section {
      border-top: 1px solid rgba(201, 162, 39, 0.1);
      padding-top: 24px;
      margin-top: 24px;
    }

    .demo-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: #999;
      text-align: center;
      margin-bottom: 18px;
      display: block;
    }

    .demo-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 12px;
    }

    .demo-card {
      padding: 16px 12px;
      background: rgba(201, 162, 39, 0.06);
      border: 1.5px solid rgba(201, 162, 39, 0.15);
      border-radius: 10px;
      text-align: center;
      cursor: pointer;
      transition: all 0.25s ease;
      outline: 2px solid transparent;
      outline-offset: 2px;
    }

    .demo-card:hover {
      background: rgba(201, 162, 39, 0.12);
      border-color: rgba(201, 162, 39, 0.4);
      transform: translateY(-2px);
    }

    .demo-card:focus {
      outline-color: #c9a227;
    }

    .demo-card-user {
      font-size: 13px;
      font-weight: 700;
      color: #c9a227;
      margin-bottom: 4px;
    }

    .demo-card-pass {
      font-size: 11px;
      color: #777;
    }

    /* ===== FOOTER ===== */
    .login-footer {
      text-align: center;
      padding-top: 30px;
      border-top: 1px solid rgba(201, 162, 39, 0.1);
      animation: fadeIn 1.2s ease 0.3s both;
    }

    .login-footer p {
      font-size: 11px;
      color: #666;
      line-height: 1.8;
      margin: 0 0 10px 0;
    }

    .login-footer span {
      color: #c9a227;
      font-weight: 600;
    }

    /* ===== ANIMATIONS ===== */
    @keyframes slideInDown {
      from {
        opacity: 0;
        transform: translateY(-40px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes slideInUp {
      from {
        opacity: 0;
        transform: translateY(40px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }

    /* ===== RESPONSIVE DESIGN ===== */
    @media (max-width: 768px) {
      .login-container {
        max-width: 100%;
        padding: 30px 24px;
      }

      .login-header {
        margin-bottom: 40px;
      }

      .login-title {
        font-size: 40px;
      }

      .login-card {
        padding: 30px;
      }

      .demo-grid {
        grid-template-columns: 1fr;
        gap: 10px;
      }
    }

    @media (max-width: 480px) {
      .login-container {
        padding: 24px 16px;
      }

      .login-header {
        margin-bottom: 32px;
      }

      .login-title {
        font-size: 32px;
      }

      .login-subtitle {
        font-size: 14px;
      }

      .login-card {
        padding: 24px;
        margin-bottom: 30px;
      }

      .login-form {
        gap: 20px;
      }

      .form-input {
        padding: 14px 16px;
        font-size: 14px;
      }

      .btn-submit {
        padding: 14px 20px;
        font-size: 14px;
      }

      .demo-label {
        font-size: 9px;
      }

      .login-footer p {
        font-size: 10px;
      }
    }
  </style>
</head>
<body class="login-page-body">
  <a href="#main-content" class="skip-to-content">Ir para conteúdo principal</a>

  <div class="login-page">
    <!-- Top accent line -->
    <div class="login-top-accent" role="presentation" aria-hidden="true"></div>

    <!-- Animated background orbs -->
    <div class="login-bg-orb login-bg-orb-1" role="presentation" aria-hidden="true"></div>
    <div class="login-bg-orb login-bg-orb-2" role="presentation" aria-hidden="true"></div>
    <div class="login-bg-orb login-bg-orb-3" role="presentation" aria-hidden="true"></div>

    <!-- Main login content -->
    <div class="login-container">
      <!-- Header with branding -->
      <div class="login-header">
        <div class="login-icon-wrapper" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
            <path d="M8 22h8M12 11v11M7 11c0 2.8 2.2 5 5 5s5-2.2 5-5V3H7v8z"/>
            <path d="M7 8h10"/>
          </svg>
        </div>
        <h1 class="login-title">Vinha D'Ouro</h1>
        <p class="login-subtitle">Gestão de Vinhos Premium</p>
        <div class="login-divider-line" role="presentation" aria-hidden="true"></div>
        <p class="login-tagline">Sistema de Autenticação</p>
      </div>

      <main id="main-content">
        <!-- Login card -->
        <div class="login-card">
          <form class="login-form" id="loginForm">
            <!-- Error message display -->
            <div id="loginError" class="login-error"></div>

            <!-- Username field -->
            <div class="form-group">
              <input
                type="text"
                id="username"
                class="form-input"
                placeholder="Utilizador"
                required
                autocomplete="username"
                autofocus
              />
              <label for="username" class="form-label">Utilizador</label>
            </div>

            <!-- Password field -->
            <div class="form-group">
              <input
                type="password"
                id="password"
                class="form-input"
                placeholder="Password"
                required
                autocomplete="current-password"
              />
              <label for="password" class="form-label">Password</label>
            </div>

            <!-- Submit button -->
            <button type="submit" class="btn-submit">Entrar</button>

            <!-- Demo credentials section -->
            <div class="demo-section">
              <span class="demo-label">Credenciais de Demonstração</span>
              <div class="demo-grid">
                <button type="button" class="demo-card" onclick="fillLogin('gerente','1234')" aria-label="Gerente: 1234">
                  <div class="demo-card-user">gerente</div>
                  <div class="demo-card-pass">1234</div>
                </button>
                <button type="button" class="demo-card" onclick="fillLogin('loja','1234')" aria-label="Loja: 1234">
                  <div class="demo-card-user">loja</div>
                  <div class="demo-card-pass">1234</div>
                </button>
                <button type="button" class="demo-card" onclick="fillLogin('stock','1234')" aria-label="Stock: 1234">
                  <div class="demo-card-user">stock</div>
                  <div class="demo-card-pass">1234</div>
                </button>
              </div>
            </div>
          </form>
        </div>
      </main>

      <!-- Footer -->
      <div class="login-footer">
        <p>
          <span>Vinha D'Ouro</span> — Sistema de Gestão de Vinhos
        </p>
        <p>
          Projeto ADS — <span>Universidade Lusófona</span>
        </p>
        <p>
          Desenvolvido por Pedro Gomes, Eduardo Lourenço e Kollan Intacua
        </p>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
