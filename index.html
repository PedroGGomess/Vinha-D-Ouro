<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="the 100's — Sistema de Gestão de Vinhos Premium">
  <meta name="theme-color" content="#0E0E0E">
  <title>the 100's — Bottled Memories</title>
  <link rel="icon" type="image/png" href="assets/logo-the100s.png">
  <link rel="apple-touch-icon" href="assets/logo-the100s.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">

  <style>
    /* ════════════════════════════════════════════
       the 100's — Login (clean & premium)
       Background: deep ink black with subtle warmth
       Accent:     Pantone 871C-inspired gold
       Type:       Inter (body) + Cormorant (display)
       ════════════════════════════════════════════ */

    :root {
      --ink-0:   #0A0A0B;
      --ink-1:   #131316;
      --ink-2:   #1C1C20;
      --ink-3:   #2A2A30;
      --line:    rgba(201, 169, 110, 0.14);
      --line-2:  rgba(201, 169, 110, 0.28);
      --gold:    #C9A96E;
      --gold-2:  #E0C992;
      --gold-d:  #8B7048;
      --cream:   #F5F0E8;
      --muted:   #9A9591;
      --danger:  #E0A8B8;
      --t-fast:  150ms cubic-bezier(.4,0,.2,1);
      --t-base:  280ms cubic-bezier(.4,0,.2,1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      background: var(--ink-0);
      color: var(--cream);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      overflow-x: hidden;
      position: relative;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* Subtle ambient gold glow — single radial, very soft */
    body::before {
      content: '';
      position: fixed;
      inset: -40% -10% auto auto;
      width: 70vmax; height: 70vmax;
      background: radial-gradient(circle at 50% 50%, rgba(201, 169, 110, 0.08), transparent 65%);
      pointer-events: none;
      z-index: 0;
    }
    body::after {
      content: '';
      position: fixed;
      inset: auto auto -40% -20%;
      width: 60vmax; height: 60vmax;
      background: radial-gradient(circle at 50% 50%, rgba(139, 58, 68, 0.06), transparent 65%);
      pointer-events: none;
      z-index: 0;
    }

    /* Hairline gold accent at top of viewport */
    body > .gold-rail {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      z-index: 5;
      pointer-events: none;
    }

    /* ── Main card ── */
    .login-shell {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
      animation: rise 0.6s cubic-bezier(.2,.8,.2,1) both;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Logo lockup — small, refined */
    .brand {
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }

    .brand-logo {
      width: 116px;
      height: auto;
      display: block;
      filter: drop-shadow(0 2px 16px rgba(201, 169, 110, 0.18));
      user-select: none;
      -webkit-user-drag: none;
    }

    .brand-tagline {
      font-family: 'Cormorant Garamond', 'Times New Roman', serif;
      font-style: italic;
      font-weight: 400;
      font-size: 15px;
      color: var(--gold);
      letter-spacing: 0.4px;
      opacity: 0.9;
    }

    /* ── Card ── */
    .card {
      width: 100%;
      background: linear-gradient(180deg, var(--ink-2) 0%, var(--ink-1) 100%);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 32px 30px 28px;
      box-shadow:
        0 24px 60px rgba(0, 0, 0, 0.55),
        inset 0 1px 0 rgba(255, 255, 255, 0.03);
      position: relative;
    }

    /* Top gold rule */
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 24px; right: 24px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold-2), transparent);
    }

    .card-head {
      text-align: center;
      margin-bottom: 24px;
    }

    .card-eyebrow {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--gold-d);
      margin-bottom: 6px;
    }

    .card-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 26px;
      font-weight: 500;
      color: var(--cream);
      letter-spacing: 0.2px;
    }

    /* ── Form ── */
    .field {
      margin-bottom: 16px;
    }

    .field label {
      display: block;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 1.4px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .field input {
      width: 100%;
      padding: 13px 14px;
      background: var(--ink-3);
      border: 1px solid var(--line);
      border-radius: 10px;
      font-family: inherit;
      font-size: 14px;
      color: var(--cream);
      outline: none;
      transition: border-color var(--t-fast), background-color var(--t-fast), box-shadow var(--t-fast);
    }

    .field input::placeholder {
      color: rgba(154, 149, 145, 0.6);
    }

    .field input:focus {
      border-color: var(--gold);
      background: rgba(201, 169, 110, 0.06);
      box-shadow: 0 0 0 3px rgba(201, 169, 110, 0.12);
    }

    .field input:autofill,
    .field input:-webkit-autofill {
      -webkit-text-fill-color: var(--cream);
      box-shadow: 0 0 0 1000px var(--ink-3) inset;
      caret-color: var(--cream);
    }

    /* Inline error */
    .alert {
      display: none;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      margin-bottom: 14px;
      background: rgba(139, 58, 68, 0.18);
      border: 1px solid rgba(139, 58, 68, 0.4);
      border-radius: 10px;
      font-size: 12.5px;
      color: var(--danger);
    }
    .alert.show { display: flex; }
    .alert svg { flex-shrink: 0; }

    /* Submit */
    .btn-primary {
      width: 100%;
      padding: 14px 18px;
      background: var(--gold);
      border: none;
      border-radius: 10px;
      font-family: inherit;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 1.6px;
      text-transform: uppercase;
      color: var(--ink-0);
      cursor: pointer;
      transition: transform var(--t-fast), box-shadow var(--t-fast), filter var(--t-fast);
      box-shadow: 0 4px 14px rgba(201, 169, 110, 0.25);
    }

    .btn-primary:hover  { transform: translateY(-1px); box-shadow: 0 6px 18px rgba(201, 169, 110, 0.35); filter: brightness(1.05); }
    .btn-primary:active { transform: translateY(0); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }

    /* ── Demo accounts (compact, switchable) ── */
    .demo-row {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 6px;
      margin-top: 18px;
      padding-top: 18px;
      border-top: 1px solid var(--line);
    }

    .demo-pill {
      padding: 6px 12px;
      background: transparent;
      border: 1px solid var(--line);
      border-radius: 100px;
      font-family: inherit;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.5px;
      color: var(--muted);
      cursor: pointer;
      transition: all var(--t-fast);
    }

    .demo-pill:hover {
      border-color: var(--gold);
      color: var(--cream);
      background: rgba(201, 169, 110, 0.06);
    }

    .demo-hint {
      width: 100%;
      text-align: center;
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 1.6px;
      text-transform: uppercase;
      margin-bottom: 4px;
      opacity: 0.7;
    }

    /* ── Footer ── */
    .meta {
      position: relative;
      z-index: 2;
      text-align: center;
      font-size: 10px;
      letter-spacing: 1.8px;
      text-transform: uppercase;
      color: rgba(154, 149, 145, 0.5);
    }
    .meta strong { color: var(--gold-d); font-weight: 500; letter-spacing: 1.8px; }

    /* ── Responsive ── */
    @media (max-width: 480px) {
      .login-shell { gap: 22px; }
      .brand-logo { width: 96px; }
      .brand-tagline { font-size: 13.5px; }
      .card { padding: 26px 22px 22px; border-radius: 14px; }
      .card-title { font-size: 22px; }
    }
  </style>
</head>
<body>

  <div class="gold-rail" aria-hidden="true"></div>

  <div class="login-shell">
    <div class="brand">
      <img src="assets/logo-the100s.png" alt="the 100's" class="brand-logo">
      <p class="brand-tagline">Bottled Memories</p>
    </div>

    <section class="card" aria-labelledby="card-title">
      <header class="card-head">
        <p class="card-eyebrow">Acesso · Staff</p>
        <h1 id="card-title" class="card-title">Bem-vindo</h1>
      </header>

      <form id="loginForm" autocomplete="off" novalidate>
        <div id="loginError" class="alert" role="alert">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="8" x2="12" y2="12"/>
            <line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
          <span id="loginErrorMessage">Credenciais inválidas</span>
        </div>

        <div class="field">
          <label for="username">Utilizador</label>
          <input type="text" id="username" name="username" placeholder="ex.: gerente" autocomplete="username" required>
        </div>

        <div class="field">
          <label for="password">Palavra-passe</label>
          <input type="password" id="password" name="password" placeholder="••••" autocomplete="current-password" required>
        </div>

        <button type="submit" class="btn-primary" id="login-btn">Entrar</button>

        <div class="demo-row" aria-label="Acesso rápido (demo)">
          <p class="demo-hint">Demo — clique para preencher</p>
          <button type="button" class="demo-pill" data-user="gerente">Gerente</button>
          <button type="button" class="demo-pill" data-user="loja">Loja</button>
          <button type="button" class="demo-pill" data-user="stock">Stock</button>
          <button type="button" class="demo-pill" data-user="admin">Admin</button>
        </div>
      </form>
    </section>

    <p class="meta">the 100's · <strong>Premium Gifts Heritage</strong> · ADS 2025/26</p>
  </div>

  <script>
    // Single-step login (clean & premium)
    document.addEventListener('DOMContentLoaded', () => {
      // demo pills: pré-preencher username (password fica em branco para o utilizador escrever)
      document.querySelectorAll('.demo-pill[data-user]').forEach(btn => {
        btn.addEventListener('click', () => {
          const u = btn.dataset.user;
          document.getElementById('username').value = u;
          document.getElementById('password').value = '';
          const err = document.getElementById('loginError');
          if (err) { err.classList.remove('show'); }
          document.getElementById('password').focus();
        });
      });

      // Login init (vem de app.js)
      if (typeof initLogin === 'function') initLogin();
    });
  </script>

  <script src="app.js"></script>
</body>
</html>
