<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Vinha D'Ouro - Sistema de Gestão de Vinhos Premium">
    <meta name="theme-color" content="#09080c">
    <title>Vinha D'Ouro - Gestão de Vinhos Premium</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #09080c;
            color: #f5f5f5;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Animated background orbs - gold and wine */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.06;
            pointer-events: none;
            z-index: 0;
        }

        .orb-gold {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, #C9A84C, transparent);
            top: -15%;
            left: -10%;
            animation: float-gold 28s ease-in-out infinite;
        }

        .orb-wine {
            width: 450px;
            height: 450px;
            background: radial-gradient(circle, #9B2335, transparent);
            bottom: -10%;
            right: -15%;
            animation: float-wine 32s ease-in-out infinite;
        }

        @keyframes float-gold {
            0%, 100% { transform: translate(0, 0); }
            25% { transform: translate(20px, -30px); }
            50% { transform: translate(-15px, -50px); }
            75% { transform: translate(30px, 10px); }
        }

        @keyframes float-wine {
            0%, 100% { transform: translate(0, 0); }
            25% { transform: translate(-25px, 40px); }
            50% { transform: translate(35px, -20px); }
            75% { transform: translate(-10px, -40px); }
        }

        /* Gold top accent line */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, transparent, #C9A84C, transparent);
            z-index: 100;
            box-shadow: 0 0 20px rgba(201, 168, 76, 0.3);
        }

        .login-wrapper {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 420px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Brand section */
        .brand {
            text-align: center;
            margin-bottom: 48px;
            animation: fadeInDown 0.7s ease-out;
        }

        .wine-glass {
            width: 64px;
            height: 64px;
            margin: 0 auto 24px;
            filter: drop-shadow(0 4px 12px rgba(201, 168, 76, 0.2));
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-16px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .brand h1 {
            font-family: 'Playfair Display', serif;
            font-size: 48px;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
            color: #f5f5f5;
        }

        .brand p {
            font-size: 13px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: #999;
            font-weight: 500;
            margin-bottom: 12px;
        }

        .brand .university {
            font-size: 10px;
            letter-spacing: 1px;
            color: #666;
            text-transform: uppercase;
            margin-top: 8px;
        }

        /* Glassmorphism login card */
        .login-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(201, 168, 76, 0.12);
            border-radius: 24px;
            padding: 40px 32px;
            width: 100%;
            box-shadow: 0 0 1px rgba(201, 168, 76, 0.08), inset 0 1px 0 rgba(255, 255, 255, 0.03);
            margin-bottom: 32px;
            animation: fadeInUp 0.7s ease-out 0.1s both;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(16px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Form styling */
        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: #999;
            margin-bottom: 8px;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 12px 14px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(201, 168, 76, 0.15);
            border-radius: 12px;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            color: #f5f5f5;
            transition: all 0.25s ease;
            outline: none;
        }

        input[type="text"]::placeholder,
        input[type="password"]::placeholder {
            color: #666;
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            background: rgba(201, 168, 76, 0.06);
            border-color: #C9A84C;
            box-shadow: 0 0 0 3px rgba(201, 168, 76, 0.08);
        }

        /* Error message */
        .login-error {
            display: none;
            background: rgba(155, 35, 53, 0.08);
            border: 1px solid rgba(155, 35, 53, 0.25);
            border-radius: 12px;
            padding: 12px 14px;
            margin-bottom: 20px;
            font-size: 12px;
            color: #ff7a7a;
            animation: slideInDown 0.3s ease-out;
        }

        .login-error.show {
            display: block;
        }

        @keyframes slideInDown {
            from {
                opacity: 0;
                transform: translateY(-8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Submit button */
        .btn-login {
            width: 100%;
            padding: 12px 20px;
            background: linear-gradient(135deg, #9B2335 0%, #6B1825 100%);
            border: none;
            border-radius: 12px;
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.8px;
            text-transform: uppercase;
            color: #f5f5f5;
            cursor: pointer;
            transition: all 0.25s ease;
            box-shadow: 0 4px 12px rgba(155, 35, 53, 0.2);
            margin-bottom: 20px;
        }

        .btn-login:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(155, 35, 53, 0.3);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .btn-login:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* Demo credentials section */
        .demo-section {
            border-top: 1px solid rgba(201, 168, 76, 0.08);
            padding-top: 20px;
            animation: fadeInUp 0.7s ease-out 0.2s both;
        }

        .demo-label {
            display: block;
            font-size: 10px;
            letter-spacing: 1.2px;
            text-transform: uppercase;
            color: #666;
            margin-bottom: 14px;
            text-align: center;
            font-weight: 600;
        }

        .demo-buttons {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .btn-demo {
            padding: 10px 12px;
            background: rgba(201, 168, 76, 0.06);
            border: 1px solid rgba(201, 168, 76, 0.15);
            border-radius: 10px;
            font-family: 'Inter', sans-serif;
            font-size: 11px;
            font-weight: 600;
            color: #C9A84C;
            cursor: pointer;
            transition: all 0.25s ease;
            letter-spacing: 0.4px;
        }

        .btn-demo:hover {
            background: rgba(201, 168, 76, 0.12);
            border-color: #C9A84C;
        }

        .btn-demo:active {
            transform: translateY(-1px);
        }

        .demo-cred {
            font-size: 10px;
            color: #666;
            margin-top: 2px;
        }

        /* Footer */
        .footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 20px;
            text-align: center;
            font-size: 9px;
            letter-spacing: 0.8px;
            color: #555;
            z-index: 5;
            background: linear-gradient(to top, rgba(9, 8, 12, 0.9), transparent);
            pointer-events: none;
        }

        .footer-project {
            display: block;
            margin-bottom: 4px;
            text-transform: uppercase;
        }

        .footer-authors {
            display: block;
            color: #444;
            font-size: 8px;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .login-wrapper {
                padding: 16px;
                max-width: 100%;
                margin-bottom: 100px;
            }

            .brand {
                margin-bottom: 40px;
            }

            .brand h1 {
                font-size: 36px;
            }

            .login-card {
                padding: 32px 24px;
            }

            .footer {
                padding: 16px;
                font-size: 8px;
            }
        }

        @media (max-width: 400px) {
            .brand h1 {
                font-size: 28px;
            }

            .wine-glass {
                width: 48px;
                height: 48px;
            }

            .login-card {
                padding: 24px 16px;
            }
        }
    </style>
</head>
<body>
    <!-- Animated background orbs -->
    <div class="orb orb-gold"></div>
    <div class="orb orb-wine"></div>

    <div class="login-wrapper">
        <!-- Brand -->
        <div class="brand">
            <svg class="wine-glass" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <linearGradient id="glassGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#C9A84C;stop-opacity:1" />
                        <stop offset="100%" style="stop-color:#9B2335;stop-opacity:0.8" />
                    </linearGradient>
                </defs>
                <!-- Wine glass bowl -->
                <path d="M 32 20 L 28 55 Q 28 72 50 78 Q 72 72 72 55 L 68 20 Z" fill="none" stroke="url(#glassGradient)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                <!-- Stem -->
                <line x1="50" y1="78" x2="50" y2="88" stroke="url(#glassGradient)" stroke-width="2" stroke-linecap="round"/>
                <!-- Base -->
                <ellipse cx="50" cy="90" rx="14" ry="3.5" fill="none" stroke="url(#glassGradient)" stroke-width="2"/>
                <!-- Wine level -->
                <path d="M 32 58 Q 32 68 50 74 Q 68 68 68 58" fill="url(#glassGradient)" opacity="0.25"/>
            </svg>
            <h1>Vinha D'Ouro</h1>
            <p>Gestao de Vinhos Premium</p>
            <div class="university">Projeto ADS - Universidade Lusofona</div>
        </div>

        <!-- Login card -->
        <div class="login-card">
            <!-- Error display -->
            <div id="loginError" class="login-error" style="display: none;">
                <span id="loginErrorMessage"></span>
            </div>

            <!-- Login form -->
            <form id="loginForm">
                <div class="form-group">
                    <label for="username">Utilizador</label>
                    <input
                        type="text"
                        id="username"
                        name="username"
                        placeholder="Utilizador"
                        autocomplete="username"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="password">Palavra-passe</label>
                    <input
                        type="password"
                        id="password"
                        name="password"
                        placeholder="Palavra-passe"
                        autocomplete="current-password"
                        required
                    >
                </div>

                <button type="submit" class="btn-login">Entrar</button>

                <!-- Demo credentials -->
                <div class="demo-section">
                    <span class="demo-label">Demo Credentials</span>
                    <div class="demo-buttons">
                        <button type="button" class="btn-demo" onclick="fillLogin('gerente', '1234')">
                            Gerente / 1234
                            <div class="demo-cred">Gerente do Sistema</div>
                        </button>
                        <button type="button" class="btn-demo" onclick="fillLogin('loja', '1234')">
                            Loja / 1234
                            <div class="demo-cred">Ponto de Venda</div>
                        </button>
                        <button type="button" class="btn-demo" onclick="fillLogin('stock', '1234')">
                            Stock / 1234
                            <div class="demo-cred">Inventario</div>
                        </button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <!-- Footer -->
    <div class="footer">
        <span class="footer-project">Vinha D'Ouro - Projeto ADS - Universidade Lusofona</span>
        <span class="footer-authors">Pedro Gomes, Eduardo Lourenco e Kollan Intacua</span>
    </div>

    <!-- External stylesheets -->
    <link rel="stylesheet" href="style.css">

    <script>
        /**
         * Fill login form with demo credentials
         * @param {string} username - Demo username
         * @param {string} password - Demo password
         */
        function fillLogin(username, password) {
            const usernameInput = document.getElementById('username');
            const passwordInput = document.getElementById('password');

            if (usernameInput && passwordInput) {
                usernameInput.value = username;
                passwordInput.value = password;
                usernameInput.focus();
            }
        }

        /**
         * Initialize login on DOM ready
         */
        document.addEventListener('DOMContentLoaded', function() {
            if (typeof initLogin === 'function') {
                initLogin();
            }
        });
    </script>

    <script src="app.js"></script>
</body>
</html>
