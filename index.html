<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Vinha D'Ouro - Sistema de Gestão de Vinhos Premium">
    <meta name="theme-color" content="#050203">
    <title>Vinha D'Ouro - Gestão de Vinhos Premium</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=Cormorant+Garamond:ital@0;1&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(ellipse at center, #1a0f12 0%, #050203 70%, #000 100%);
            color: #f5f5f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: auto;
            position: relative;
        }

        /* Floating particles animation */
        @keyframes float-particle {
            0%, 100% {
                transform: translate(0, 0) scale(1);
                opacity: 0.3;
            }
            50% {
                transform: translate(var(--tx), var(--ty)) scale(0.8);
                opacity: 0.1;
            }
        }

        .particle {
            position: fixed;
            width: 2px;
            height: 2px;
            background: #C9A227;
            border-radius: 50%;
            pointer-events: none;
            opacity: 0.2;
        }

        .particle:nth-child(1) { --tx: 80px; --ty: -100px; animation: float-particle 12s ease-in-out infinite; left: 10%; top: 15%; }
        .particle:nth-child(2) { --tx: -60px; --ty: 120px; animation: float-particle 14s ease-in-out infinite 1s; left: 20%; top: 60%; }
        .particle:nth-child(3) { --tx: 100px; --ty: 80px; animation: float-particle 16s ease-in-out infinite 2s; left: 85%; top: 25%; }
        .particle:nth-child(4) { --tx: -90px; --ty: -60px; animation: float-particle 18s ease-in-out infinite 0.5s; left: 75%; top: 75%; }
        .particle:nth-child(5) { --tx: 70px; --ty: 110px; animation: float-particle 15s ease-in-out infinite 1.5s; left: 5%; top: 50%; }
        .particle:nth-child(6) { --tx: -100px; --ty: 70px; animation: float-particle 17s ease-in-out infinite 2.5s; left: 90%; top: 40%; }

        /* ===== CENTERED GLASS CARD ===== */
        .login-container {
            width: 100%;
            max-width: 420px;
            padding: 40px 20px;
            animation: slideUp 0.8s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .glass-card {
            background: rgba(15, 8, 10, 0.7);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1.5px solid rgba(201, 162, 39, 0.15);
            border-radius: 24px;
            padding: 60px 40px;
            box-shadow:
                0 8px 32px rgba(0, 0, 0, 0.4),
                0 0 1px rgba(201, 162, 39, 0.2),
                inset 0 1px 1px rgba(255, 255, 255, 0.05);
            position: relative;
            overflow: hidden;
        }

        /* Premium glow effect */
        .glass-card::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(201, 162, 39, 0.08) 0%, transparent 70%);
            pointer-events: none;
            animation: glow-rotate 8s linear infinite;
        }

        @keyframes glow-rotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Card content wrapper */
        .card-content {
            position: relative;
            z-index: 2;
        }

        /* Brand header inside card */
        .brand-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .wine-glass-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            filter: drop-shadow(0 4px 16px rgba(201, 162, 39, 0.2));
            animation: gentle-float 3s ease-in-out infinite;
        }

        @keyframes gentle-float {
            0%, 100% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-12px);
            }
        }

        .brand-title {
            font-family: 'Playfair Display', serif;
            font-size: 44px;
            font-weight: 700;
            letter-spacing: -1px;
            color: #f5f5f5;
            margin-bottom: 8px;
            line-height: 1.1;
        }

        .brand-line {
            width: 40px;
            height: 1.5px;
            background: #C9A227;
            margin: 14px auto;
            box-shadow: 0 0 12px rgba(201, 162, 39, 0.4);
        }

        .brand-subtitle {
            font-family: 'Cormorant Garamond', serif;
            font-size: 18px;
            font-style: italic;
            color: #C9A227;
            letter-spacing: 0.3px;
            font-weight: 400;
            margin-top: 12px;
        }

        /* Form section */
        .login-form {
            margin-bottom: 32px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.8px;
            text-transform: uppercase;
            color: #999;
            margin-bottom: 10px;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.03);
            border: 1.5px solid rgba(201, 162, 39, 0.2);
            border-radius: 12px;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            color: #f5f5f5;
            transition: all 0.3s ease;
            outline: none;
            letter-spacing: 0.2px;
        }

        input[type="text"]::placeholder,
        input[type="password"]::placeholder {
            color: #666;
            font-weight: 400;
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            background: rgba(201, 162, 39, 0.05);
            border-color: #C9A227;
            box-shadow: 0 0 0 3px rgba(201, 162, 39, 0.1);
        }

        /* Error message */
        .login-error {
            display: none;
            background: rgba(155, 35, 53, 0.12);
            border: 1px solid rgba(155, 35, 53, 0.35);
            border-radius: 12px;
            padding: 12px 14px;
            margin-bottom: 20px;
            font-size: 12px;
            color: #ff9a9a;
            animation: slideInDown 0.3s ease-out;
        }

        .login-error.show {
            display: block;
        }

        @keyframes slideInDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Wine-red gradient login button */
        .btn-login {
            width: 100%;
            padding: 14px 20px;
            background: linear-gradient(135deg, #A02643 0%, #7B1E32 100%);
            border: none;
            border-radius: 12px;
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.8px;
            text-transform: uppercase;
            color: #f5f5f5;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 16px rgba(155, 35, 53, 0.3),
                        0 0 24px rgba(201, 162, 39, 0) transition-property;
            margin-bottom: 28px;
            position: relative;
            overflow: hidden;
        }

        .btn-login::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.1);
            transition: left 0.4s ease;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 24px rgba(155, 35, 53, 0.4),
                        0 0 32px rgba(201, 162, 39, 0.15);
        }

        .btn-login:hover::before {
            left: 100%;
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .btn-login:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* Demo credentials section */
        .demo-section {
            border-top: 1px solid rgba(201, 162, 39, 0.12);
            padding-top: 28px;
        }

        .demo-label {
            display: block;
            font-size: 10px;
            letter-spacing: 1.2px;
            text-transform: uppercase;
            color: #777;
            margin-bottom: 18px;
            text-align: center;
            font-weight: 600;
        }

        .demo-cards {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 12px;
        }

        .demo-card {
            background: rgba(201, 162, 39, 0.05);
            border: 1.5px solid rgba(201, 162, 39, 0.18);
            border-radius: 12px;
            padding: 16px 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Inter', sans-serif;
            position: relative;
            overflow: hidden;
        }

        .demo-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: rgba(201, 162, 39, 0.08);
            transition: left 0.3s ease;
            z-index: -1;
        }

        .demo-card:hover {
            border-color: #C9A227;
            transform: translateY(-4px);
            box-shadow: 0 6px 20px rgba(201, 162, 39, 0.15);
        }

        .demo-card:hover::before {
            left: 0;
        }

        .demo-icon {
            width: 32px;
            height: 32px;
            margin: 0 auto 8px;
            display: block;
        }

        .demo-role {
            font-size: 12px;
            font-weight: 600;
            color: #C9A227;
            letter-spacing: 0.3px;
            margin-bottom: 4px;
            line-height: 1.3;
        }

        .demo-cred {
            font-size: 9px;
            color: #777;
            letter-spacing: 0.2px;
        }

        /* Footer */
        .footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 16px 20px;
            text-align: center;
            font-size: 8px;
            letter-spacing: 0.8px;
            color: #666;
            z-index: 5;
            background: linear-gradient(to top, rgba(5, 2, 3, 0.98), transparent);
            pointer-events: none;
        }

        .footer-text {
            display: block;
            text-transform: uppercase;
            font-weight: 500;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 480px) {
            .login-container {
                max-width: 100%;
                padding: 20px;
            }

            .glass-card {
                padding: 40px 24px;
                border-radius: 20px;
            }

            .brand-title {
                font-size: 36px;
            }

            .brand-subtitle {
                font-size: 16px;
            }

            .wine-glass-icon {
                width: 70px;
                height: 70px;
            }

            .demo-cards {
                grid-template-columns: 1fr;
            }

            .footer {
                padding: 12px 16px;
                font-size: 7px;
            }
        }

        @media (max-width: 768px) {
            .brand-title {
                font-size: 40px;
            }

            .brand-subtitle {
                font-size: 17px;
            }
        }
    </style>
</head>
<body>
    <!-- Floating particles background -->
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>

    <!-- Centered glass card login -->
    <div class="login-container">
        <div class="glass-card">
            <div class="card-content">
                <!-- Brand header -->
                <div class="brand-header">
                    <!-- Wine glass SVG icon -->
                    <svg class="wine-glass-icon" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                        <defs>
                            <linearGradient id="glassGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" style="stop-color:#C9A227;stop-opacity:1" />
                                <stop offset="100%" style="stop-color:#A02643;stop-opacity:0.9" />
                            </linearGradient>
                        </defs>
                        <!-- Wine glass bowl -->
                        <path d="M 32 20 L 28 55 Q 28 72 50 78 Q 72 72 72 55 L 68 20 Z" fill="none" stroke="url(#glassGradient)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                        <!-- Stem -->
                        <line x1="50" y1="78" x2="50" y2="88" stroke="url(#glassGradient)" stroke-width="2" stroke-linecap="round"/>
                        <!-- Base -->
                        <ellipse cx="50" cy="90" rx="14" ry="3.5" fill="none" stroke="url(#glassGradient)" stroke-width="2"/>
                        <!-- Wine level -->
                        <path d="M 32 58 Q 32 68 50 74 Q 68 68 68 58" fill="url(#glassGradient)" opacity="0.4"/>
                    </svg>

                    <!-- Brand title -->
                    <h1 class="brand-title">Vinha D'Ouro</h1>

                    <!-- Gold line -->
                    <div class="brand-line"></div>

                    <!-- Tagline -->
                    <p class="brand-subtitle">Sistema de Gestão Premium</p>
                </div>

                <!-- Login form -->
                <form id="loginForm" class="login-form">
                    <!-- Error display -->
                    <div id="loginError" class="login-error">
                        <span id="loginErrorMessage"></span>
                    </div>

                    <!-- Username field -->
                    <div class="form-group">
                        <label for="username">Utilizador</label>
                        <input
                            type="text"
                            id="username"
                            name="username"
                            placeholder="Introduza o seu utilizador"
                            autocomplete="username"
                            required
                        >
                    </div>

                    <!-- Password field -->
                    <div class="form-group">
                        <label for="password">Palavra-passe</label>
                        <input
                            type="password"
                            id="password"
                            name="password"
                            placeholder="Introduza a sua palavra-passe"
                            autocomplete="current-password"
                            required
                        >
                    </div>

                    <!-- Submit button -->
                    <button type="submit" class="btn-login">Entrar</button>

                    <!-- Demo credentials section -->
                    <div class="demo-section">
                        <span class="demo-label">Credenciais de Demo</span>
                        <div class="demo-cards">
                            <button type="button" class="demo-card" onclick="fillLogin('gerente', '1234')">
                                <svg class="demo-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="#C9A227" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                                    <circle cx="12" cy="7" r="4"></circle>
                                    <path d="M16 11h6"></path>
                                </svg>
                                <div class="demo-role">Gerente</div>
                                <div class="demo-cred">gerente / 1234</div>
                            </button>
                            <button type="button" class="demo-card" onclick="fillLogin('loja', '1234')">
                                <svg class="demo-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="#C9A227" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                                    <circle cx="9" cy="21" r="1"></circle>
                                    <circle cx="20" cy="21" r="1"></circle>
                                    <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
                                </svg>
                                <div class="demo-role">Loja</div>
                                <div class="demo-cred">loja / 1234</div>
                            </button>
                            <button type="button" class="demo-card" onclick="fillLogin('stock', '1234')">
                                <svg class="demo-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="#C9A227" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                                    <line x1="9" y1="2" x2="9" y2="20"></line>
                                    <line x1="15" y1="2" x2="15" y2="20"></line>
                                    <line x1="3" y1="8" x2="21" y2="8"></line>
                                    <line x1="3" y1="14" x2="21" y2="14"></line>
                                    <rect x="3" y="2" width="18" height="20" rx="2"></rect>
                                </svg>
                                <div class="demo-role">Stock</div>
                                <div class="demo-cred">stock / 1234</div>
                            </button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <div class="footer">
        <span class="footer-text">Universidade Lusófona · Grupo 13 · ADS</span>
    </div>

    <!-- External stylesheets -->
    <link rel="stylesheet" href="style.css">

    <script>
        /**
         * Fill login form with demo credentials
         * @param {string} username - Demo username
         * @param {string} password - Demo password
         */
        function fillLogin(username, password) {
            const usernameInput = document.getElementById('username');
            const passwordInput = document.getElementById('password');

            if (usernameInput && passwordInput) {
                usernameInput.value = username;
                passwordInput.value = password;
                usernameInput.focus();
            }
        }

        /**
         * Initialize login on DOM ready
         */
        document.addEventListener('DOMContentLoaded', function() {
            if (typeof initLogin === 'function') {
                initLogin();
            }
        });
    </script>

    <script src="app.js"></script>
</body>
</html>
