<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">

<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#C9A96E"/>
  </marker>
  <marker id="arrow-mid" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#8B7C68"/>
  </marker>
  <marker id="arrow-wine" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#8B3A44"/>
  </marker>
  <marker id="arrow-open" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
    <path d="M 0 0 L 10 5 L 0 10" fill="none" stroke="#15110D" stroke-width="1.5"/>
  </marker>
</defs>


<style>
  text { font-family: 'Inter', 'Helvetica', sans-serif; }
  .title { font-family: 'Playfair Display', 'Georgia', serif; font-size: 22px; font-weight: 700; fill: #15110D; }
  .subtitle { font-size: 11px; fill: #8B7C68; }
  .label { font-size: 13px; font-weight: 600; }
  .small { font-size: 10px; fill: #4A453E; }
  .tiny { font-size: 9px; fill: #8B7C68; }
  .arrow { stroke: #C9A96E; stroke-width: 1.8; fill: none; marker-end: url(#arrow); }
  .arrow-thin { stroke: #8B7C68; stroke-width: 1.2; fill: none; marker-end: url(#arrow-mid); }
  .arrow-include { stroke: #8B3A44; stroke-width: 1.4; fill: none; marker-end: url(#arrow-wine); stroke-dasharray: 5,4; }
  .box { fill: #FAF6EC; stroke: #C9A96E; stroke-width: 1.5; }
  .box-dark { fill: #15110D; stroke: #C9A96E; stroke-width: 1.5; }
  .actor-line { stroke: #15110D; stroke-width: 1.4; fill: none; }
  .lifeline { stroke: #8B7C68; stroke-width: 1; stroke-dasharray: 4,4; }
  .activation { fill: #C9A96E; opacity: 0.85; stroke: #C9A96E; stroke-width: 0.5; }
  .gold-line { stroke: #C9A96E; stroke-width: 0.5; }
</style>

<rect width="900" height="600" fill="#FAF6EC"/>

    <text x="450.0" y="38" class="title" text-anchor="middle">Diagrama UML — Caso de Uso "Realizar Venda"</text>
    <text x="450.0" y="56" class="subtitle" text-anchor="middle">the 100's — Sistema POS</text>

    <!-- Ator: stickman -->
    <g transform="translate(100, 220)">
      <circle cx="0" cy="0" r="18" fill="none" stroke="#15110D" stroke-width="2.2"/>
      <line x1="0" y1="18" x2="0" y2="65" class="actor-line"/>
      <line x1="-25" y1="35" x2="25" y2="35" class="actor-line"/>
      <line x1="0" y1="65" x2="-20" y2="105" class="actor-line"/>
      <line x1="0" y1="65" x2="20" y2="105" class="actor-line"/>
      <text x="0" y="130" text-anchor="middle" font-size="13" font-weight="600">Funcionário</text>
      <text x="0" y="146" text-anchor="middle" font-size="10" fill="#8B7C68">(POS)</text>
    </g>

    <!-- Sistema box -->
    <rect x="220" y="100" width="580" height="450" rx="8" fill="none" stroke="#8B7C68" stroke-width="1" stroke-dasharray="6,4"/>
    <text x="800" y="92" text-anchor="end" font-size="11" fill="#8B7C68" font-style="italic">Sistema: the 100's POS</text>

    <!-- Use case bubbles (ellipses) -->
    <ellipse cx="380" cy="160" rx="120" ry="32" fill="#FAF6EC" stroke="#C9A96E" stroke-width="1.6"/>
    <text x="380" y="158" text-anchor="middle" font-size="13" font-weight="600">Selecionar Vinho</text>
    <text x="380" y="174" text-anchor="middle" font-size="10" fill="#8B7C68">do catálogo</text>

    <ellipse cx="380" cy="245" rx="120" ry="32" fill="#FAF6EC" stroke="#C9A96E" stroke-width="1.6"/>
    <text x="380" y="243" text-anchor="middle" font-size="13" font-weight="600">Adicionar ao Carrinho</text>
    <text x="380" y="259" text-anchor="middle" font-size="10" fill="#8B7C68">qty + tamanho</text>

    <ellipse cx="380" cy="335" rx="120" ry="32" fill="#FAF6EC" stroke="#C9A96E" stroke-width="1.6"/>
    <text x="380" y="333" text-anchor="middle" font-size="13" font-weight="600">Escolher Pagamento</text>
    <text x="380" y="349" text-anchor="middle" font-size="10" fill="#8B7C68">cartão · numerário · MBWay</text>

    <ellipse cx="380" cy="425" rx="120" ry="32" fill="#FAF6EC" stroke="#C9A96E" stroke-width="1.6"/>
    <text x="380" y="423" text-anchor="middle" font-size="13" font-weight="600">Emitir Fatura</text>
    <text x="380" y="439" text-anchor="middle" font-size="10" fill="#8B7C68">ATCUD + QR AT</text>

    <!-- Include use cases (à direita) -->
    <ellipse cx="660" cy="200" rx="100" ry="28" fill="#ECE3D2" stroke="#8B3A44" stroke-width="1.4" stroke-dasharray="0"/>
    <text x="660" y="198" text-anchor="middle" font-size="12" font-weight="600">Validar Stock</text>
    <text x="660" y="213" text-anchor="middle" font-size="9" fill="#8B7C68">por vinho</text>

    <ellipse cx="660" cy="380" rx="100" ry="28" fill="#ECE3D2" stroke="#8B3A44" stroke-width="1.4"/>
    <text x="660" y="378" text-anchor="middle" font-size="12" font-weight="600">Gerar QR Code AT</text>
    <text x="660" y="393" text-anchor="middle" font-size="9" fill="#8B7C68">Portaria 195/2020</text>

    <!-- Linhas ator -> UC -->
    <line x1="130" y1="235" x2="260" y2="160" stroke="#15110D" stroke-width="1.2"/>
    <line x1="130" y1="245" x2="260" y2="245" stroke="#15110D" stroke-width="1.2"/>
    <line x1="130" y1="260" x2="260" y2="335" stroke="#15110D" stroke-width="1.2"/>
    <line x1="130" y1="275" x2="260" y2="425" stroke="#15110D" stroke-width="1.2"/>

    <!-- <<include>> arrows -->
    <line x1="500" y1="245" x2="560" y2="208" class="arrow-include"/>
    <text x="540" y="218" font-size="10" fill="#8B3A44" font-style="italic">&lt;&lt;include&gt;&gt;</text>

    <line x1="500" y1="425" x2="560" y2="388" class="arrow-include"/>
    <text x="540" y="397" font-size="10" fill="#8B3A44" font-style="italic">&lt;&lt;include&gt;&gt;</text>
    
</svg>