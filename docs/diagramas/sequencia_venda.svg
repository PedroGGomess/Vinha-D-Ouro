<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 720" width="1000" height="720">

<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#C9A96E"/>
  </marker>
  <marker id="arrow-mid" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#8B7C68"/>
  </marker>
  <marker id="arrow-wine" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#8B3A44"/>
  </marker>
  <marker id="arrow-open" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
    <path d="M 0 0 L 10 5 L 0 10" fill="none" stroke="#15110D" stroke-width="1.5"/>
  </marker>
</defs>


<style>
  text { font-family: 'Inter', 'Helvetica', sans-serif; }
  .title { font-family: 'Playfair Display', 'Georgia', serif; font-size: 22px; font-weight: 700; fill: #15110D; }
  .subtitle { font-size: 11px; fill: #8B7C68; }
  .label { font-size: 13px; font-weight: 600; }
  .small { font-size: 10px; fill: #4A453E; }
  .tiny { font-size: 9px; fill: #8B7C68; }
  .arrow { stroke: #C9A96E; stroke-width: 1.8; fill: none; marker-end: url(#arrow); }
  .arrow-thin { stroke: #8B7C68; stroke-width: 1.2; fill: none; marker-end: url(#arrow-mid); }
  .arrow-include { stroke: #8B3A44; stroke-width: 1.4; fill: none; marker-end: url(#arrow-wine); stroke-dasharray: 5,4; }
  .box { fill: #FAF6EC; stroke: #C9A96E; stroke-width: 1.5; }
  .box-dark { fill: #15110D; stroke: #C9A96E; stroke-width: 1.5; }
  .actor-line { stroke: #15110D; stroke-width: 1.4; fill: none; }
  .lifeline { stroke: #8B7C68; stroke-width: 1; stroke-dasharray: 4,4; }
  .activation { fill: #C9A96E; opacity: 0.85; stroke: #C9A96E; stroke-width: 0.5; }
  .gold-line { stroke: #C9A96E; stroke-width: 0.5; }
</style>

<rect width="1000" height="720" fill="#FAF6EC"/>

    <text x="500.0" y="38" class="title" text-anchor="middle">Diagrama de Sequência — Criação de Venda</text>
    <text x="500.0" y="56" class="subtitle" text-anchor="middle">POST /api/vendas com transação atómica (FOR UPDATE)</text>
    
            <g transform="translate(130, 95)">
              <circle cx="0" cy="0" r="12" fill="none" stroke="#15110D" stroke-width="2"/>
              <line x1="0" y1="12" x2="0" y2="40" class="actor-line"/>
              <line x1="-15" y1="22" x2="15" y2="22" class="actor-line"/>
              <line x1="0" y1="40" x2="-12" y2="62" class="actor-line"/>
              <line x1="0" y1="40" x2="12" y2="62" class="actor-line"/>
              <text x="0" y="85" text-anchor="middle" font-size="12" font-weight="600">Funcionário</text>
            </g>
            <line x1="130" y1="160" x2="130" y2="640" class="lifeline"/>
            <rect x="255" y="95" width="150" height="50" rx="6" class="box-dark"/>
            <text x="330" y="120" text-anchor="middle" font-size="12" font-weight="600" fill="#E0C992">POS</text>
            <text x="330" y="134" text-anchor="middle" font-size="10" fill="#ECE3D2">(loja.html)</text><line x1="330" y1="160" x2="330" y2="640" class="lifeline"/>
            <rect x="485" y="95" width="150" height="50" rx="6" class="box-dark"/>
            <text x="560" y="120" text-anchor="middle" font-size="12" font-weight="600" fill="#E0C992">server.py</text>
            <text x="560" y="134" text-anchor="middle" font-size="10" fill="#ECE3D2">/api/vendas</text><line x1="560" y1="160" x2="560" y2="640" class="lifeline"/>
            <rect x="745" y="95" width="150" height="50" rx="6" class="box-dark"/>
            <text x="820" y="120" text-anchor="middle" font-size="12" font-weight="600" fill="#E0C992">MySQL</text>
            <text x="820" y="134" text-anchor="middle" font-size="10" fill="#ECE3D2">vinhos+vendas</text><line x1="820" y1="160" x2="820" y2="640" class="lifeline"/>
    <rect x="380" y="425" width="510" height="180" rx="4" fill="none" stroke="#8B3A44" stroke-width="1.4"/>
    <rect x="380" y="425" width="60" height="20" fill="#8B3A44"/>
    <text x="385" y="440" font-size="11" font-weight="700" fill="#FAF6EC">alt</text>
    <text x="455" y="440" font-size="11" font-weight="600" fill="#8B3A44">stock OK</text>
    
    <line x1="380" y1="555" x2="890" y2="555" stroke="#8B3A44" stroke-width="1.2" stroke-dasharray="6,3"/>
    <text x="455" y="552" font-size="11" font-weight="600" fill="#8B3A44">stock insuficiente</text>
    
        <line x1="130" y1="185" x2="330" y2="185" stroke="#C9A96E" stroke-width="1.6" marker-end="url(#arrow)"/>
        <text x="230.0" y="180" text-anchor="middle" font-size="11" font-weight="600" fill="#15110D">1. Confirmar Pagamento (Enter)</text>
        <text x="230.0" y="200" text-anchor="middle" font-size="10" fill="#8B7C68" font-style="italic">F9 -> checkout modal</text>
        
        <line x1="330" y1="235" x2="560" y2="235" stroke="#C9A96E" stroke-width="1.6" marker-end="url(#arrow)"/>
        <text x="445.0" y="230" text-anchor="middle" font-size="11" font-weight="600" fill="#15110D">2. POST /api/vendas</text>
        <text x="445.0" y="250" text-anchor="middle" font-size="10" fill="#8B7C68" font-style="italic">{items, metodoPagamento, NIF?, ...}</text>
        
        <line x1="560" y1="290" x2="820" y2="290" stroke="#C9A96E" stroke-width="1.6" marker-end="url(#arrow)"/>
        <text x="690.0" y="285" text-anchor="middle" font-size="11" font-weight="600" fill="#15110D">3. BEGIN TRANSACTION</text>
        <text x="690.0" y="305" text-anchor="middle" font-size="10" fill="#8B7C68" font-style="italic">isolation: REPEATABLE READ</text>
        
        <line x1="560" y1="340" x2="820" y2="340" stroke="#C9A96E" stroke-width="1.6" marker-end="url(#arrow)"/>
        <text x="690.0" y="335" text-anchor="middle" font-size="11" font-weight="600" fill="#15110D">4. SELECT quantidade FROM vinhos</text>
        <text x="690.0" y="355" text-anchor="middle" font-size="10" fill="#8B7C68" font-style="italic">WHERE id IN (...) FOR UPDATE</text>
        
        <line x1="820" y1="390" x2="560" y2="390" stroke="#8B7C68" stroke-width="1.6" stroke-dasharray="5,4" marker-end="url(#arrow-mid)"/>
        <text x="690.0" y="385" text-anchor="middle" font-size="11" font-weight="600" fill="#15110D">5. linhas bloqueadas (qty)</text>
        <text x="690.0" y="405" text-anchor="middle" font-size="10" fill="#8B7C68" font-style="italic">lock até COMMIT/ROLLBACK</text>
        
        <line x1="560" y1="470" x2="820" y2="470" stroke="#C9A96E" stroke-width="1.6" marker-end="url(#arrow)"/>
        <text x="690.0" y="465" text-anchor="middle" font-size="11" font-weight="600" fill="#15110D">6a. INSERT INTO vendas + itens_venda</text>
        <text x="690.0" y="485" text-anchor="middle" font-size="10" fill="#8B7C68" font-style="italic">+ UPDATE vinhos SET qty -= n</text>
        
        <line x1="820" y1="510" x2="560" y2="510" stroke="#8B7C68" stroke-width="1.6" stroke-dasharray="5,4" marker-end="url(#arrow-mid)"/>
        <text x="690.0" y="505" text-anchor="middle" font-size="11" font-weight="600" fill="#15110D">7a. ids inseridos</text>
        <text x="690.0" y="525" text-anchor="middle" font-size="10" fill="#8B7C68" font-style="italic">lastrowid</text>
        
        <line x1="560" y1="540" x2="820" y2="540" stroke="#C9A96E" stroke-width="1.6" marker-end="url(#arrow)"/>
        <text x="690.0" y="535" text-anchor="middle" font-size="11" font-weight="600" fill="#15110D">8a. COMMIT</text>
        <text x="690.0" y="555" text-anchor="middle" font-size="10" fill="#8B7C68" font-style="italic">transação atomica</text>
        
        <line x1="560" y1="580" x2="820" y2="580" stroke="#C9A96E" stroke-width="1.6" marker-end="url(#arrow)"/>
        <text x="690.0" y="575" text-anchor="middle" font-size="11" font-weight="600" fill="#15110D">6b. ROLLBACK</text>
        <text x="690.0" y="595" text-anchor="middle" font-size="10" fill="#8B7C68" font-style="italic">stock fica intacto</text>
        
        <line x1="560" y1="640" x2="330" y2="640" stroke="#8B7C68" stroke-width="1.6" stroke-dasharray="5,4" marker-end="url(#arrow-mid)"/>
        <text x="445.0" y="635" text-anchor="middle" font-size="11" font-weight="600" fill="#15110D">9. 201 Created  ou  409 Conflict</text>
        <text x="445.0" y="655" text-anchor="middle" font-size="10" fill="#8B7C68" font-style="italic">{ id, codigo, total }</text>
        
    <rect x="326" y="190" width="8" height="460" class="activation"/>
    <rect x="556" y="240" width="8" height="410" class="activation"/>
    <rect x="816" y="290" width="8" height="300" class="activation"/>
    
    <rect x="40" y="660" width="920" height="50" rx="6" fill="white" stroke="#ECE3D2"/>
    <text x="60" y="680" font-size="11" font-weight="700" fill="#8B3A44">! Concorrência:</text>
    <text x="180" y="680" font-size="11" fill="#4A453E">SELECT ... FOR UPDATE bloqueia as linhas dos vinhos até COMMIT/ROLLBACK,</text>
    <text x="60" y="697" font-size="11" fill="#4A453E">evitando que duas vendas paralelas vendam mais stock do que existe (race condition).</text>
    
</svg>