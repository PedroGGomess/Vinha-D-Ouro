spring.application.name=vinhadouro-backend

# Server Configuration
server.port=8080
server.servlet.context-path=/

# MySQL Database Configuration - Development
spring.datasource.url=jdbc:mysql://localhost:3306/vinhadouro?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true

# Logging - Development (more verbose)
logging.level.root=INFO
logging.level.pt.vinhadouro=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=DEBUG

# Application Configuration
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null

# Development Tools
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true
